```html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Marketplace</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome İkonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React Kütüphaneleri -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Çeviriler
        const translations = {
            TR: {
                app_name: 'Nexus', search_placeholder: 'Ne arıyorsunuz?',
                login: 'Giriş / Kayıt', add_product: 'İlan Ver', logout: 'Çıkış Yap',
                home: 'Ana Sayfa', profile: 'Profilim', all_categories: 'Tümü', 
                electronics: 'Elektronik', real_estate: 'Emlak', vehicles: 'Vasıta', fashion: 'Moda',
                send_message: 'Sohbet Et', show_number: 'Numarayı Gör', product_details: 'İlan Açıklaması'
            }
        };

        const initialUsers = [
            { id: 1, username: 'admin', password: 'admin2026', name: 'Sistem Yöneticisi', role: 'admin', avatar: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=150', rating: 5.0, likedProducts: [] },
            { id: 2, username: 'ahmet', password: '123', name: 'Ahmet Yılmaz', role: 'user', avatar: 'https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&w=150', rating: 4.8, likedProducts: [1] }
        ];

        const initialProducts = [
            { id: 1, title: 'iPhone 13 Pro Max - 256GB', description: 'Çok temiz, garantisi devam ediyor.', price: 42500, category: 'electronics', images: ['https://images.unsplash.com/photo-1632661674596-df8be070a5c5?auto=format&fit=crop&q=80&w=800'], sellerId: 2, location: 'İstanbul', createdAt: '2 saat önce' },
            { id: 2, title: 'MacBook Air M2', description: 'Yazılımcıdan temiz cihaz.', price: 32000, category: 'electronics', images: ['https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?auto=format&fit=crop&q=80&w=800'], sellerId: 1, location: 'Ankara', createdAt: '5 saat önce' },
            { id: 3, title: 'IKEA Modern Koltuk', description: 'Ev değişikliği sebebiyle satılık.', price: 4500, category: 'real_estate', images: ['https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?auto=format&fit=crop&q=80&w=800'], sellerId: 2, location: 'İzmir', createdAt: '1 gün önce' }
        ];

        // Storage Helpers
        const safeGetStorage = (key, fallback) => {
            try { const item = window.localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } 
            catch (e) { return fallback; }
        };
        const safeSetStorage = (key, value) => {
            try { window.localStorage.setItem(key, JSON.stringify(value)); } 
            catch (e) { console.warn('Hafıza dolu veya hata!'); }
        };

        function App() {
            const [theme, setTheme] = useState(() => safeGetStorage('nx_theme', 'light'));
            const [users, setUsers] = useState(() => safeGetStorage('nx_users', initialUsers));
            const [products, setProducts] = useState(() => safeGetStorage('nx_products', initialProducts));
            const [currentUser, setCurrentUser] = useState(() => safeGetStorage('nx_user', null));
            const [chatHistory, setChatHistory] = useState(() => safeGetStorage('nx_chats', {})); // Mesaj geçmişi

            const t = translations['TR'];
            const [view, setView] = useState('home'); 
            const [selectedProductId, setSelectedProductId] = useState(null);
            const [toastMessage, setToastMessage] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [activeCategory, setActiveCategory] = useState('all_categories');
            
            // Chat State
            const [activeChat, setActiveChat] = useState(null); // { sellerId, sellerName }
            const [messageInput, setMessageInput] = useState('');

            useEffect(() => { safeSetStorage('nx_theme', theme); }, [theme]);
            useEffect(() => { safeSetStorage('nx_users', users); }, [users]);
            useEffect(() => { safeSetStorage('nx_products', products); }, [products]);
            useEffect(() => { safeSetStorage('nx_user', currentUser); }, [currentUser]);
            useEffect(() => { safeSetStorage('nx_chats', chatHistory); }, [chatHistory]);

            const colors = theme === 'dark' 
                ? { bg: 'bg-slate-900', text: 'text-slate-100', cardBg: 'bg-slate-800', border: 'border-slate-700', muted: 'text-slate-400', input: 'bg-slate-900 text-white border-slate-700' }
                : { bg: 'bg-slate-50', text: 'text-slate-900', cardBg: 'bg-white', border: 'border-slate-200', muted: 'text-slate-500', input: 'bg-white text-slate-900 border-slate-200' };

            const formatPrice = (price) => new Intl.NumberFormat('tr-TR').format(Number(price)) + ' TL';
            const showToast = (message) => { setToastMessage(message); setTimeout(() => setToastMessage(''), 3000); };

            // 1. PROFİL FOTOĞRAFI GÜNCELLEME
            const handleAvatarUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if(file.size > 2 * 1024 * 1024) { // 2MB Limiti
                        showToast('Hata: Fotoğraf 2MB boyutundan küçük olmalıdır!');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (ev) => { 
                        const updatedUser = { ...currentUser, avatar: ev.target.result };
                        setCurrentUser(updatedUser);
                        setUsers(users.map(u => u.id === updatedUser.id ? updatedUser : u));
                        showToast('Profil resmi başarıyla güncellendi!');
                    };
                    reader.readAsDataURL(file);
                }
            };

            // 2. ÜRÜN EKLEME
            const handleAddProduct = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                
                const newProduct = {
                    id: Date.now(),
                    title: formData.get('title'),
                    price: Number(formData.get('price')),
                    description: formData.get('description'),
                    category: formData.get('category'),
                    location: formData.get('location'),
                    images: [formData.get('image') || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&q=80&w=800'],
                    sellerId: currentUser.id,
                    createdAt: 'Az önce'
                };
                
                setProducts([newProduct, ...products]); 
                setView('home'); 
                showToast('İlan başarıyla yayınlandı!');
            };

            // 3. MESAJLAŞMA SİSTEMİ
            const handleSendMessage = (e) => {
                e.preventDefault();
                if(!messageInput.trim() || !activeChat) return;

                const chatId = activeChat.sellerId;
                const newMessage = {
                    id: Date.now(),
                    text: messageInput,
                    sender: 'me', // Geliştirilebilir (gönderen ID'si vb.)
                    time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})
                };

                setChatHistory(prev => ({
                    ...prev,
                    [chatId]: [...(prev[chatId] || []), newMessage]
                }));
                setMessageInput('');
            };

            const handleAuth = (e, isLogin) => {
                e.preventDefault();
                const username = e.target.username.value;
                const password = e.target.password.value;
                if (isLogin) {
                    const user = users.find(u => u.username === username && u.password === password);
                    if (user) { setCurrentUser(user); setView('home'); showToast(`Hoşgeldin, ${user.name}!`); } 
                    else showToast('Hatalı giriş!');
                } else {
                    if(users.find(u => u.username === username)){ showToast('Kullanıcı adı kullanımda!'); return; }
                    const newUser = { id: Date.now(), username, password, name: e.target.name.value, role: 'user', avatar: '', rating: 0, likedProducts: [] };
                    setUsers([...users, newUser]); setCurrentUser(newUser); setView('home'); showToast('Kayıt Başarılı!');
                }
            };

            const Navbar = () => (
                <nav className="bg-indigo-900 text-white sticky top-0 z-50 shadow-xl border-b border-indigo-800">
                    <div className="max-w-7xl mx-auto px-4 flex justify-between items-center h-16 gap-4">
                        <div className="flex items-center cursor-pointer" onClick={() => setView('home')}>
                            <div className="flex items-center justify-center bg-white text-indigo-900 rounded-xl font-black text-xl h-10 w-10 shadow-lg">NX</div>
                            <span className="font-bold text-xl hidden md:block mx-3">{t.app_name}</span>
                        </div>
                        
                        <div className="flex-1 flex items-center justify-center max-w-2xl mx-auto relative group">
                            <i className="fa-solid fa-magnifying-glass absolute left-4 text-indigo-400"></i>
                            <input 
                                className="w-full pl-11 pr-4 py-2.5 rounded-2xl bg-indigo-950/50 border border-indigo-700/50 text-white placeholder-indigo-300 focus:bg-white focus:text-gray-900 outline-none" 
                                placeholder={t.search_placeholder} 
                                value={searchQuery} 
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                        </div>

                        <div className="flex items-center gap-2 flex-shrink-0">
                            <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="p-2 rounded-xl bg-indigo-800/50 hover:bg-indigo-700 hidden sm:block">
                                <i className={`fa-solid ${theme==='light'?'fa-moon':'fa-sun'} text-lg`}></i>
                            </button>
                            
                            {currentUser ? (
                                <React.Fragment>
                                    <button onClick={() => setView('add')} className="hidden lg:flex items-center px-4 py-2 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-500 font-medium text-sm transition">
                                        <i className="fa-solid fa-circle-plus mr-1"></i> {t.add_product}
                                    </button>
                                    <button onClick={() => setView('profile')} className="ml-2">
                                        <img src={currentUser.avatar || 'https://ui-avatars.com/api/?name='+currentUser.username+'&background=random'} className="h-10 w-10 rounded-xl object-cover border-2 border-indigo-400"/>
                                    </button>
                                </React.Fragment>
                            ) : <button onClick={() => setView('login')} className="px-5 py-2.5 rounded-xl bg-white text-indigo-900 font-bold hover:bg-indigo-50 text-sm">{t.login}</button>}
                        </div>
                    </div>
                </nav>
            );

            const HomeView = () => {
                let filtered = products;
                if (activeCategory !== 'all_categories') filtered = filtered.filter(p => p.category === activeCategory);
                if (searchQuery) filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery.toLowerCase()));
                const categories = ['all_categories', 'electronics', 'real_estate', 'vehicles', 'fashion'];

                return (
                    <div className="max-w-7xl mx-auto px-4 py-8">
                        <div className="flex overflow-x-auto pb-4 mb-6 gap-3 hide-scrollbar">
                            {categories.map(cat => (
                                <button key={cat} onClick={() => setActiveCategory(cat)} className={`whitespace-nowrap px-6 py-2.5 rounded-2xl text-sm font-bold transition-all ${activeCategory === cat ? 'bg-indigo-600 text-white shadow-md' : `${colors.cardBg} ${colors.text} border ${colors.border}`}`}>{t[cat] || cat}</button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {filtered.map(product => (
                                <div key={product.id} className={`rounded-3xl shadow-lg hover:-translate-y-1 transition-all cursor-pointer flex flex-col border ${colors.border} ${colors.cardBg}`} onClick={() => { setSelectedProductId(product.id); setView('product'); }}>
                                    <div className="relative h-56 overflow-hidden bg-slate-200 dark:bg-slate-800 rounded-t-3xl">
                                        <img src={product.images[0]} className="w-full h-full object-cover" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                        <p className="absolute bottom-3 left-3 text-white text-2xl font-black drop-shadow-md">{formatPrice(product.price)}</p>
                                    </div>
                                    <div className="p-5 flex flex-col flex-1 gap-3">
                                        <h3 className={`font-bold text-lg leading-tight line-clamp-2 ${colors.text}`}>{product.title}</h3>
                                        <div className={`mt-auto flex items-center justify-between text-xs font-medium border-t ${colors.border} pt-3 ${colors.muted}`}>
                                            <span className="flex items-center gap-1"><i className="fa-solid fa-location-dot text-indigo-500"></i>{product.location}</span><span>{product.createdAt}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const ProductDetailView = () => {
                const product = products.find(p => p.id === selectedProductId);
                const seller = users.find(u => u.id === product?.sellerId) || users[0];
                const [showPhone, setShowPhone] = useState(false);
                if (!product) return null;

                const openChat = () => {
                    if (!currentUser) { setView('login'); showToast('Önce giriş yapmalısınız.'); return; }
                    if (currentUser.id === seller.id) { showToast('Kendi ilanınız!'); return; }
                    setActiveChat({ sellerId: seller.id, sellerName: seller.name, avatar: seller.avatar });
                };

                return (
                    <div className="max-w-5xl mx-auto px-4 py-8 animate-fade-in-up">
                        <button onClick={() => setView('home')} className={`mb-6 font-bold ${colors.text}`}><i className="fa-solid fa-chevron-left mr-2"></i> {t.home}</button>

                        <div className={`rounded-3xl shadow-xl border ${colors.cardBg} ${colors.border} overflow-hidden flex flex-col lg:flex-row`}>
                            <div className="lg:w-1/2 relative bg-slate-100 dark:bg-slate-900 min-h-[400px]">
                                <img src={product.images[0]} className="absolute inset-0 w-full h-full object-cover" />
                            </div>
                            <div className="lg:w-1/2 p-8 flex flex-col gap-6">
                                <div>
                                    <h1 className={`text-3xl font-black mt-2 mb-2 ${colors.text}`}>{product.title}</h1>
                                    <p className="text-4xl font-black text-indigo-600">{formatPrice(product.price)}</p>
                                </div>
                                <div className={`p-5 rounded-2xl border ${colors.border} bg-slate-50 dark:bg-slate-800 flex flex-col gap-2`}>
                                    <h3 className={`font-bold ${colors.text}`}>{t.product_details}</h3>
                                    <p className={`text-sm ${colors.muted}`}>{product.description}</p>
                                </div>
                                <div className={`mt-auto p-5 rounded-3xl border ${colors.border} bg-indigo-50 dark:bg-slate-800`}>
                                    <div className="flex items-center gap-4 mb-5">
                                        <img src={seller.avatar || 'https://ui-avatars.com/api/?name='+seller.username} className="w-16 h-16 rounded-2xl object-cover"/>
                                        <div><h3 className={`font-black text-lg ${colors.text}`}>{seller.name}</h3></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={openChat} className="bg-indigo-600 text-white py-3.5 rounded-2xl font-bold"><i className="fa-solid fa-comment-dots mr-2"></i>{t.send_message}</button>
                                        <button onClick={() => setShowPhone(!showPhone)} className={`border-2 border-indigo-600 text-indigo-600 py-3.5 rounded-2xl font-bold`}><i className="fa-solid fa-phone mr-2"></i>{showPhone ? '+90 5XX XXX XX XX' : t.show_number}</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const ProfileView = () => {
                if (!currentUser) return null;
                const myProducts = products.filter(p => p.sellerId === currentUser.id);

                return (
                    <div className="max-w-5xl mx-auto px-4 py-8 animate-fade-in-up">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className={`text-3xl font-black ${colors.text}`}>{t.profile}</h2>
                            <button onClick={() => { setCurrentUser(null); setView('home'); }} className="text-red-500 bg-red-100 px-4 py-2 rounded-xl font-bold"><i className="fa-solid fa-right-from-bracket mr-2"></i>{t.logout}</button>
                        </div>
                        <div className="flex flex-col md:flex-row gap-8">
                            <div className={`md:w-1/3 rounded-3xl p-6 border shadow-xl ${colors.cardBg} ${colors.border} h-fit text-center`}>
                                <div className="relative inline-block group cursor-pointer">
                                    <img src={currentUser.avatar || 'https://ui-avatars.com/api/?name='+currentUser.username} className="w-32 h-32 rounded-full border-4 border-indigo-100 object-cover"/>
                                    <label className="absolute inset-0 bg-black/50 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center cursor-pointer transition">
                                        <i className="fa-solid fa-camera text-white text-2xl"></i>
                                        <input type="file" accept="image/*" className="hidden" onChange={handleAvatarUpload}/>
                                    </label>
                                </div>
                                <h3 className={`text-2xl font-bold mt-4 ${colors.text}`}>{currentUser.name}</h3>
                                <p className={colors.muted}>@{currentUser.username}</p>
                            </div>
                            <div className="md:w-2/3 space-y-6">
                                <h3 className={`text-xl font-bold ${colors.text}`}>Benim İlanlarım</h3>
                                {myProducts.length === 0 ? <p className={colors.muted}>Henüz ilan vermediniz.</p> : myProducts.map(p => (
                                    <div key={p.id} className={`flex items-center gap-4 p-4 rounded-2xl border shadow-sm ${colors.cardBg} ${colors.border}`}>
                                        <img src={p.images[0]} className="w-20 h-20 rounded-xl object-cover"/>
                                        <div className="flex-1"><h4 className={`font-bold ${colors.text}`}>{p.title}</h4><p className="text-indigo-600 font-bold">{formatPrice(p.price)}</p></div>
                                        <button onClick={() => { setProducts(products.filter(pr=>pr.id !== p.id)); showToast('İlan Silindi!'); }} className="p-2 text-red-500 bg-red-50 rounded-xl"><i className="fa-solid fa-trash"></i></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const AddProductView = () => {
                return (
                    <div className="max-w-3xl mx-auto px-4 py-8 animate-fade-in-up">
                        <div className={`rounded-3xl shadow-xl border p-8 ${colors.cardBg} ${colors.border}`}>
                            <h2 className={`text-3xl font-black mb-8 ${colors.text}`}><i className="fa-solid fa-circle-plus text-indigo-600 mr-2"></i>{t.add_product}</h2>
                            <form onSubmit={handleAddProduct} className="space-y-5">
                                <div><label className={`block font-bold mb-2 ${colors.text}`}>İlan Başlığı</label><input name="title" required className={`w-full p-4 rounded-xl border ${colors.input}`}/></div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className={`block font-bold mb-2 ${colors.text}`}>Kategori</label><select name="category" className={`w-full p-4 rounded-xl border ${colors.input}`}><option value="electronics">Elektronik</option><option value="real_estate">Emlak</option><option value="vehicles">Vasıta</option></select></div>
                                    <div><label className={`block font-bold mb-2 ${colors.text}`}>Fiyat (TL)</label><input type="number" name="price" required className={`w-full p-4 rounded-xl border ${colors.input}`}/></div>
                                </div>
                                <div><label className={`block font-bold mb-2 ${colors.text}`}>Konum (Şehir)</label><input name="location" required className={`w-full p-4 rounded-xl border ${colors.input}`}/></div>
                                <div><label className={`block font-bold mb-2 ${colors.text}`}>Fotoğraf Linki (URL)</label><input name="image" placeholder="https://..." className={`w-full p-4 rounded-xl border ${colors.input}`}/></div>
                                <div><label className={`block font-bold mb-2 ${colors.text}`}>Açıklama</label><textarea name="description" rows="4" required className={`w-full p-4 rounded-xl border ${colors.input} resize-none`}></textarea></div>
                                <button type="submit" className="w-full bg-indigo-600 text-white font-black text-lg py-4 rounded-xl hover:bg-indigo-700">İlanı Yayınla</button>
                            </form>
                        </div>
                    </div>
                );
            };

            const AuthView = () => {
                const [isLoginMode, setIsLoginMode] = useState(true);
                return (
                    <div className="min-h-[80vh] flex items-center justify-center p-4">
                        <div className={`w-full max-w-md p-8 rounded-3xl shadow-2xl border ${colors.cardBg} ${colors.border}`}>
                            <h2 className={`text-3xl font-black text-center mb-8 ${colors.text}`}>{isLoginMode ? 'Giriş Yap' : 'Kayıt Ol'}</h2>
                            <form className="space-y-5" onSubmit={(e) => handleAuth(e, isLoginMode)}>
                                {!isLoginMode && <div><input name="name" required placeholder="Ad Soyad" className={`w-full p-4 rounded-2xl border-2 ${colors.input}`}/></div>}
                                <div><input name="username" required placeholder="Kullanıcı Adı" className={`w-full p-4 rounded-2xl border-2 ${colors.input}`}/></div>
                                <div><input name="password" type="password" required placeholder="Şifre" className={`w-full p-4 rounded-2xl border-2 ${colors.input}`}/></div>
                                <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black">{isLoginMode ? 'Giriş Yap' : 'Kayıt Ol'}</button>
                            </form>
                            <button onClick={() => setIsLoginMode(!isLoginMode)} className="w-full mt-6 font-bold text-indigo-600">{isLoginMode ? 'Yeni Hesap Oluştur' : 'Zaten hesabım var'}</button>
                        </div>
                    </div>
                );
            };

            // GERÇEK MESAJLAŞMA MODÜLÜ
            const ChatModal = () => {
                if (!activeChat) return null;
                const chatId = activeChat.sellerId;
                const msgs = chatHistory[chatId] || [];

                return (
                    <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className={`w-full max-w-lg h-[500px] flex flex-col shadow-2xl rounded-2xl overflow-hidden ${colors.cardBg} border ${colors.border}`}>
                            <div className="bg-indigo-600 p-4 text-white flex justify-between items-center">
                                <div className="flex items-center">
                                    <img src={activeChat.avatar || 'https://ui-avatars.com/api/?name='+activeChat.sellerName} className="w-10 h-10 rounded-full mr-3 border border-indigo-400 object-cover"/>
                                    <div><p className="font-bold">{activeChat.sellerName}</p><p className="text-xs text-indigo-200">Çevrimiçi</p></div>
                                </div>
                                <button onClick={() => setActiveChat(null)} className="hover:bg-indigo-500 p-2 rounded-xl"><i className="fa-solid fa-xmark text-xl"></i></button>
                            </div>
                            
                            <div className={`flex-1 p-4 overflow-y-auto space-y-4 ${theme==='dark'?'bg-slate-900':'bg-slate-50'}`}>
                                {msgs.length === 0 ? <p className="text-center text-gray-400 text-sm mt-10">Mesaj göndererek sohbeti başlatın.</p> : null}
                                {msgs.map((m) => (
                                    <div key={m.id} className="flex justify-end">
                                        <div className="bg-indigo-600 text-white p-3 rounded-2xl rounded-tr-sm max-w-[80%] shadow-md">
                                            <p className="text-sm">{m.text}</p>
                                            <span className="text-[10px] text-indigo-200 mt-1 block text-right">{m.time}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <form onSubmit={handleSendMessage} className={`p-4 border-t ${colors.border} bg-white dark:bg-slate-800 flex space-x-2`}>
                                <input value={messageInput} onChange={(e) => setMessageInput(e.target.value)} type="text" placeholder="Mesaj yazın..." required className={`flex-1 px-4 py-3 rounded-xl border ${colors.border} ${colors.input} outline-none`}/>
                                <button type="submit" className="px-5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-bold"><i className="fa-solid fa-paper-plane"></i></button>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className={`min-h-screen flex flex-col transition-colors duration-500 ${colors.bg} ${theme}`}>
                    <Navbar />
                    <main className="flex-1">
                        {view === 'home' && <HomeView />}
                        {view === 'product' && <ProductDetailView />}
                        {view === 'login' && <AuthView />}
                        {view === 'profile' && <ProfileView />}
                        {view === 'add' && <AddProductView />}
                    </main>

                    <ChatModal />

                    {toastMessage && (
                        <div className="fixed top-24 left-1/2 transform -translate-x-1/2 z-50 animate-fade-in-down">
                            <div className="bg-slate-900/90 text-white px-6 py-3.5 rounded-full shadow-2xl flex items-center gap-3 font-bold text-sm">
                                <i className="fa-solid fa-circle-check text-green-400"></i> {toastMessage}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
